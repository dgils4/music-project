<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Igreja</title>

<style>
body {
    font-family: Arial;
    background: #0a0f1c;
    color: white;
    padding: 20px;
}
.container {
    max-width: 700px;
    margin: auto;
    background: #111827;
    padding: 20px;
    border-radius: 10px;
}
.pergunta { margin-bottom: 15px; }
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #1e40af;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
.resultado {
    margin-top: 20px;
    text-align: center;
    font-size: 18px;
}
</style>
</head>

<body>
<div class="container" id="app">

<h1>Quiz Bíblico e Igreja</h1>

<div id="quiz"></div>

<button onclick="calcular()">Ver Resultado</button>
<button id="btnShare" style="display:none;" onclick="compartilhar()">Compartilhar no WhatsApp</button>

<div class="resultado" id="resultado"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://cdechrtprerblmhllqav.supabase.co";
const supabaseKey = "sb_publishable_j4OQ1upwpdGwJttGeQSp1A_5mc7QlWJ";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
</script>



<script>
// BLOQUEIO DE NOVA TENTATIVA
if (localStorage.getItem("quizFinalizado")) {
    document.getElementById("app").innerHTML = `
        <h2 id="titulo">⚠️ Você já respondeu o quiz!</h2>
        <p>Não é permitido refazer.</p>
    `;

    // AGORA adiciona o evento
    let cliques = 0;

    document.getElementById("titulo").addEventListener("click", () => {
        cliques++;

        if (cliques >= 5) {
            if (confirm("Modo secreto ativado. Resetar quiz?")) {
                localStorage.clear();
                location.reload();
            }
            cliques = 0;
        }

        setTimeout(() => { cliques = 0; }, 2000);
    });
}

// PERGUNTAS
const perguntas = [
["Quem ressuscitou ao terceiro dia?", ["Moisés","Jesus Cristo","Pedro","João"], 1],
["Onde Jesus transformou água em vinho?", ["Jerusalém","Caná","Roma","Egito"], 1],
["Quantos discípulos Jesus tinha?", ["10","11","12","13"], 2],
["Quem traiu Jesus?", ["Pedro","João","Judas","Tiago"], 2],
["Jesus andou sobre o quê?", ["Areia","Fogo","Água","Pedra"], 2],
["Quem negou Jesus 3 vezes?", ["Paulo","Pedro","Mateus","Lucas"], 1],
["Qual milagre multiplicou alimento?", ["Peixes e pães","Água","Vinho","Sal"], 0],
["Jesus curou um cego com?", ["Água","Saliva","Areia","Óleo"], 1],
["Onde Jesus nasceu?", ["Roma","Belém","Jerusalém","Egito"], 1],
["Quem batizou Jesus?", ["Pedro","João Batista","Paulo","Tiago"], 1],

["A Igreja Nova Apostólica foi organizada em qual país?", ["Brasil","França","Alemanha","EUA"], 2],
["Em que ano foi organizada?", ["1800","1863","1900","2000"], 1],
["Quais são os 3 sacramentos?", ["Batismo, Ceia e Selamento","Oração, Jejum e Fé","Amor, Paz e Alegria","Lei, Graça e Fé"], 0],
["Quem é o Apóstolo-Mor?", ["Pedro","Jean-Luc Schneider","Paulo","João"], 1],
["O batismo representa?", ["Tradição","Novo nascimento","Festa","Regra"], 1],

["Jesus ressuscitou em quantos dias?", ["1","2","3","7"], 2],
["Qual livro fala da criação?", ["Mateus","Gênesis","Apocalipse","Salmos"], 1],
["Quem abriu o mar?", ["Abraão","Moisés","Davi","José"], 1],
["Primeiro milagre de Jesus?", ["Curar cego","Água em vinho","Multiplicar pão","Andar na água"], 1],
["O que é fé verdadeira?", ["Só acreditar","Acreditar e agir","Ir à igreja","Cantar"], 1],
];

// GERAR QUIZ
let html = "";
perguntas.forEach((p, i) => {
    html += `<div class="pergunta"><p>${i+1}. ${p[0]}</p>`;
    ["A","B","C","D"].forEach((l, j) => {
        html += `<label><input type="radio" name="q${i}" value="${j}"> ${l}) ${p[1][j]}</label><br>`;
    });
    html += `</div>`;
});
document.getElementById("quiz").innerHTML = html;

// CALCULAR RESULTADO
let resultadoTexto = "";

async function calcular() {
    let nome = prompt("Digite seu nome:");
    if (!nome) {
        alert("Você precisa digitar seu nome!");
        return;
    }

    let pontos = 0;

    for (let i = 0; i < perguntas.length; i++) {
        let r = document.querySelector(`input[name="q${i}"]:checked`);
        if (!r) {
            alert("Responda todas!");
            return;
        }
        if (parseInt(r.value) === perguntas[i][2]) pontos++;
    }

    let codigo = Math.random().toString(36).substring(2, 8).toUpperCase();

    resultadoTexto = `Resultado: ${pontos}/20\nCódigo: ${codigo}`;

    // 🔥 SALVAR CERTO
    try {
        await supabaseClient
          .from('resultados') // CORRIGIDO
          .insert([
            {
              nome: nome,
              pontos: pontos,
              codigo: codigo
            }
          ]);
    } catch (e) {
        console.log("Erro:", e);
    }

    document.getElementById("resultado").innerHTML = `
        🎯 Você acertou ${pontos} de 20<br>
        🔐 Código: <b>${codigo}</b>
    `;

    document.querySelectorAll("input").forEach(el => el.disabled = true);

    localStorage.setItem("quizFinalizado", "true");

    document.getElementById("btnShare").style.display = "block";
}
  
  
  

// COMPARTILHAR
function compartilhar() {
    let url = "https://wa.me/?text=" + encodeURIComponent(resultadoTexto);
    window.open(url, "_blank");
}


</script>

</body>
</html>
