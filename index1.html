<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultar Resultado</title>

<style>
body {
    font-family: Arial;
    background: #0a0f1c;
    color: white;
    padding: 20px;
}
.container {
    max-width: 500px;
    margin: auto;
    background: #111827;
    padding: 20px;
    border-radius: 10px;
    text-align: center;
}
input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 5px;
    border: none;
}
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #1e40af;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
.resultado {
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Consultar Resultado</h2>

    <input type="text" id="nome" placeholder="Digite seu nome completo">

    <button onclick="buscar()">Buscar Resultado</button>

    <div class="resultado" id="resultado"></div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://cdechrtprerblmhllqav.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkZWNocnRwcmVyYmxtaGxscWF2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjc3MjMsImV4cCI6MjA5MTYwMzcyM30.m-RFl-dDWFsjbWqSZw-y0BDqnpHX5hMH8Z361MCT_Rk";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

// BUSCAR RESULTADO
async function buscar() {

    let nome = document.getElementById("nome").value.trim();

    if (!nome) {
        alert("Digite seu nome!");
        return;
    }

    let { data, error } = await supabaseClient
        .from('resultados')
        .select('*')
        .ilike('nome', nome); // busca ignorando maiúscula/minúscula

    if (error) {
        document.getElementById("resultado").innerHTML = "Erro ao buscar.";
        console.log(error);
        return;
    }

    if (data.length === 0) {
        document.getElementById("resultado").innerHTML = "❌ Nenhum resultado encontrado.";
        return;
    }

    let html = "";

    data.forEach(r => {
        html += `
            🎯 Pontos: ${r.pontos}<br>
            🔐 Código: ${r.codigo}<br><br>
        `;
    });

    document.getElementById("resultado").innerHTML = html;
}
</script>

</body>
</html>
